# Burn-in — flaky-test detection. Runs the Django suite repeatedly to surface
# non-deterministic failures BEFORE they reach main. Even ONE failure across the
# iterations means a test is flaky and must be fixed.
#
# Runs on PRs to main/develop and weekly (cron), NOT on every push (too slow).
name: Burn-in

on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1' # Mondays 03:00 UTC
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of burn-in iterations'
        required: false
        default: '10'

permissions:
  contents: read

jobs:
  burn-in:
    name: Flaky test detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run burn-in loop
        run: |
          ITER="${{ github.event.inputs.iterations || '10' }}"
          echo "Running $ITER burn-in iterations..."
          for i in $(seq 1 "$ITER"); do
            echo "::group::Burn-in iteration $i/$ITER"
            python manage.py test --settings=config.test_settings --verbosity 1 \
              2>&1 | tee "burn-in-$i.log" || { echo "FLAKY: failed on iteration $i"; exit 1; }
            echo "::endgroup::"
          done
          echo "All $ITER iterations passed — suite is stable."

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: burn-in-*.log
          retention-days: 30
