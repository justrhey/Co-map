# Co-Map CI — security pipeline. Complements test.yml (lint/test/build) with
# dependency vulnerability scanning and a secret-leak guard for the frontend
# bundle. See docs/SECURITY.md for the rationale behind each check (OWASP A06/A08).
name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Weekly scan so newly-disclosed CVEs in pinned deps are caught even without a push.
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Python dependency CVE scan (OWASP A06) ──
  python-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Run pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt --strict --desc

  # ── Frontend: npm CVE scan + secret-leak guard (OWASP A06/A08) ──
  frontend-audit:
    name: npm audit & secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (high+)
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Scan frontend source for leaked secrets
        run: bash scripts/check-frontend-secrets.sh

  # ── Single gate both lanes must satisfy ──
  security-pass:
    name: Security passed
    runs-on: ubuntu-latest
    needs: [python-audit, frontend-audit]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.python-audit.result }}" != "success" ] || \
             [ "${{ needs.frontend-audit.result }}" != "success" ]; then
            echo "One or more security jobs failed."
            exit 1
          fi
          echo "All security jobs passed."
