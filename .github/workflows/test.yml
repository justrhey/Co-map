# Co-Map CI — quality pipeline for the Django backend + React (Vite) frontend.
# Stages: lint -> test -> report. Burn-in (flaky detection) lives in burn-in.yml
# so it only runs on PRs and on a schedule, never on every push.
#
# Adapted from the BMAD testarch/ci workflow for a Python + Vite stack (no
# Playwright e2e in this repo; the suite is Django's manage.py test).
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Backend: Django test suite (in-memory SQLite via test_settings) ──
  backend-test:
    name: Backend tests (Django)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        run: python manage.py check --settings=config.test_settings

      - name: Run test suite
        run: |
          python manage.py test --settings=config.test_settings \
            --parallel --verbosity 2 2>&1 | tee backend-test.log

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-log
          path: backend-test.log
          retention-days: 30

  # ── Frontend: lint + production build (Vite) ──
  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-log
          path: frontend/dist
          retention-days: 7

  # ── Report: single gate that both lanes must satisfy ──
  ci-pass:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [backend-test, frontend]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.backend-test.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
