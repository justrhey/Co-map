version: "3.9"

services:
  db:
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    environment:
      POSTGRES_DB: complaints_db
      POSTGRES_USER: complaints_user
      POSTGRES_PASSWORD: complaints_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complaints_user -d complaints_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: change-me-in-production
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: complaints_db
      POSTGRES_USER: complaints_user
      POSTGRES_PASSWORD: complaints_pass
      CORS_ALLOWED_ORIGINS: "http://localhost:8000,http://127.0.0.1:8000,http://localhost:5173,http://localhost:5500"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
